<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تخته نرد</title>

<style>
body{
margin:0;
background:#2d1b0f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:tahoma;
}

.board{
width:95vw;
max-width:900px;
aspect-ratio:2/1;
background:#b57a3d;
border:10px solid #5d3413;
border-radius:15px;
display:grid;
grid-template-columns:repeat(12,1fr);
overflow:hidden;
}

.point{
border:1px solid rgba(0,0,0,.2);
position:relative;
}

.point:nth-child(odd){
background:#d8b07b;
}

.point:nth-child(even){
background:#8a4e22;
}

.title{
position:absolute;
top:10px;
width:100%;
text-align:center;
color:white;
font-size:28px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="title">
🎲 تخته نرد
</div>

<div class="board">

<div class="point"></div>
<div class="point"></div>
<div class="point"></div>
<div class="point"></div>
<div class="point"></div>
<div class="point"></div>

<div class="point"></div>
<div class="point"></div>
<div class="point"></div>
<div class="point"></div>
<div class="point"></div>
<div class="point"></div>

<div class="point"></div>
<div class="point"></div>
<div class="point"></div>
<div class="point"></div>
<div class="point"></div>
<div class="point"></div>

<div class="point"></div>
<div class="point"></div>
<div class="point"></div>
<div class="point"></div>
<div class="point"></div>
<div class="point"></div>

</div>

</body>
</html>
